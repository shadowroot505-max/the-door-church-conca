<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - The Door Christian Centre</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6B8E23;
            --primary-dark: #556B2F;
            --bg-light: #F4F1DE;
            --text-dark: #333333;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-family: 'Playfair Display', serif;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-danger {
            background-color: #d9534f;
            color: white;
        }

        .btn-primary {
            background-color: var(--primary-dark);
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--white);
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .auth-container {
            max-width: 400px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Lato', sans-serif;
        }

        .hidden {
            display: none;
        }

        .dashboard-section {
            margin-bottom: 3rem;
        }

        .dashboard-section h2 {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 0.5rem;
        }

        .card {
            border: 1px solid #ddd;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-details h4 {
            margin: 0 0 0.5rem 0;
        }

        .card-details p {
            margin: 0;
            color: #666;
            font-size: 0.9rem;
        }

        .add-form {
            background: #fafafa;
            padding: 1.5rem;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-top: 1rem;
        }

        #loginError {
            color: red;
            margin-bottom: 1rem;
        }

        .btn-secondary {
            background-color: #888;
            color: white;
            margin-left: 8px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .card-actions .btn {
            font-size: 0.85rem;
            padding: 6px 12px;
        }

        .btn-primary:hover {
            background-color: #3e5018;
        }

        .btn-danger:hover {
            background-color: #c9302c;
        }

        .btn-secondary:hover {
            background-color: #666;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <h1>Admin Dashboard</h1>
        <div id="logoutSection" class="hidden">
            <button id="logoutBtn" class="btn btn-danger"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>
            <a href="/" class="btn btn-primary" style="text-decoration: none; margin-left:10px;"><i
                    class="fa-solid fa-home"></i> View Site</a>
        </div>
    </header>

    <!-- Login Area -->
    <div class="container auth-container" id="loginArea">
        <h2>Admin Login</h2>
        <p id="loginError" class="hidden">Invalid username or password.</p>
        <button id="googleSignInBtn" class="btn btn-primary" style="width: 100%;"><i class="fa-brands fa-google"></i> Login with Google</button>
    </div>

    <!-- Dashboard Area -->
    <div class="container hidden" id="dashboardArea">
        
        <!-- Site Settings -->
        <div class="dashboard-section">
            <h2>Site Settings</h2>
            <div class="add-form">
                <form id="settingsForm">
                    <div class="form-group"><label>Website Name</label><input type="text" id="siteName" required></div>
                    <div class="form-group"><label>Hero Title</label><input type="text" id="heroTitle" required></div>
                    <div class="form-group"><label>Hero Subtitle</label><input type="text" id="heroSubtitle" required></div>
                    <div class="form-group"><label>About Us Text</label><textarea id="aboutText" rows="4" required></textarea></div>
                    <button type="submit" class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
                    <span id="settingsStatus" style="margin-left: 10px; color: green; font-weight: bold;"></span>
                </form>
            </div>
        </div>

        <!-- Leadership & Contact Settings -->
        <div class="dashboard-section">
            <h2>Leadership & Contact Settings</h2>
            <div class="add-form">
                <form id="contactSettingsForm">
                    <h3 style="margin-top:0;">Our Leadership</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
                        <div>
                            <h4>Leader 1</h4>
                            <div class="form-group"><label>Image URL</label><input type="text" id="leader1ImgUrl"></div>
                            <div class="form-group"><label>Name</label><input type="text" id="leader1NameVal"></div>
                            <div class="form-group"><label>Role</label><input type="text" id="leader1RoleVal"></div>
                        </div>
                        <div>
                            <h4>Leader 2</h4>
                            <div class="form-group"><label>Image URL</label><input type="text" id="leader2ImgUrl"></div>
                            <div class="form-group"><label>Name</label><input type="text" id="leader2NameVal"></div>
                            <div class="form-group"><label>Role</label><input type="text" id="leader2RoleVal"></div>
                        </div>
                        <div>
                            <h4>Leader 3</h4>
                            <div class="form-group"><label>Image URL</label><input type="text" id="leader3ImgUrl"></div>
                            <div class="form-group"><label>Name</label><input type="text" id="leader3NameVal"></div>
                            <div class="form-group"><label>Role</label><input type="text" id="leader3RoleVal"></div>
                        </div>
                    </div>

                    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                    
                    <h3>Contact & Map</h3>
                    <div class="form-group"><label>Address (use &lt;br&gt; for new lines)</label><input type="text" id="contactLocationVal"></div>
                    <div class="form-group"><label>Phone</label><input type="text" id="contactPhoneVal"></div>
                    <div class="form-group"><label>Email</label><input type="text" id="contactEmailVal"></div>
                    <div class="form-group"><label>Google Maps Embed URL (src link)</label><input type="text" id="contactMapUrl" placeholder="https://www.google.com/maps/embed?pb=..."></div>
                    
                    <button type="submit" class="btn btn-primary" id="saveContactBtn">Save Contact & Leadership</button>
                    <span id="contactStatus" style="margin-left: 10px; color: green; font-weight: bold;"></span>
                </form>
            </div>
        </div>

        <!-- Events Management -->
        <div class="dashboard-section">
            <h2>Manage Events</h2>
            <div id="eventsList">
                <!-- Events populated by JS -->
            </div>

            <div class="add-form">
                <h3 id="eventFormTitle">Add New Event</h3>
                <form id="addEventForm">
                    <input type="hidden" id="eventId">
                    <div class="form-group"><label>Title</label><input type="text" id="eventTitle" required></div>
                    <div style="display:flex; gap:10px;">
                        <div class="form-group" style="flex:1;"><label>Month (e.g. APR)</label><input type="text"
                                id="eventMonth" maxlength="3" required></div>
                        <div class="form-group" style="flex:1;"><label>Day (e.g. 15)</label><input type="text"
                                id="eventDay" required></div>
                    </div>
                    <div class="form-group"><label>Time Info</label><input type="text" id="eventTime" required></div>
                    <div class="form-group"><label>Description</label><textarea id="eventDesc" rows="3"
                            required></textarea></div>
                    <button type="submit" class="btn btn-primary" id="eventSubmitBtn">Save Event</button>
                    <button type="button" class="btn btn-secondary hidden" id="eventCancelBtn">Cancel Edit</button>
                </form>
            </div>
        </div>

        <!-- Sermons Management -->
        <div class="dashboard-section">
            <h2>Manage Sermons</h2>
            <div id="sermonsList">
                <!-- Sermons populated by JS -->
            </div>

            <div class="add-form">
                <h3 id="sermonFormTitle">Add New Sermon</h3>
                <form id="addSermonForm">
                    <input type="hidden" id="sermonId">
                    <div class="form-group"><label>Title</label><input type="text" id="sermonTitle" required></div>
                    <div class="form-group"><label>Date (e.g. March 17, 2026)</label><input type="text" id="sermonDate"
                            required></div>
                    <div class="form-group"><label>Preacher</label><input type="text" id="sermonPreacher" required>
                    </div>
                    <div class="form-group"><label>YouTube Embed URL</label><input type="text" id="sermonUrl"
                            placeholder="https://www.youtube.com/embed/dQw4w9WgXcQ" required></div>
                    <button type="submit" class="btn btn-primary" id="sermonSubmitBtn">Save Sermon</button>
                    <button type="button" class="btn btn-secondary hidden" id="sermonCancelBtn">Cancel Edit</button>
                </form>
            </div>
        <!-- Messages Management -->
        <div class="dashboard-section">
            <h2>Contact Messages</h2>
            <div id="messagesList">
                <p>Loading messages...</p>
            </div>
        </div>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>

</html>
